name: sentricitycx
description: "SentricityCX Flutter App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  go_router: ^14.6.3
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  fonts:
    - family: Satoshi
      fonts:
        - asset: assets/fonts/Satoshi-Variable.ttf
        - asset: assets/fonts/Satoshi-VariableItalic.ttf
          style: italic

    - family: AvenirLTStd
      fonts:
        - asset: assets/fonts/AvenirLTStd-Roman.otf
          weight: 400
        - asset: assets/fonts/AvenirLTStd-Oblique.otf
          weight: 400
          style: italic
        - asset: assets/fonts/AvenirLTStd-Book.otf
          weight: 400
        - asset: assets/fonts/AvenirLTStd-BookOblique.otf
          weight: 400
          style: italic
        - asset: assets/fonts/AvenirLTStd-Medium.otf
          weight: 500
        - asset: assets/fonts/AvenirLTStd-MediumOblique.otf
          weight: 500
          style: italic
        - asset: assets/fonts/AvenirLTStd-Heavy.otf
          weight: 700
        - asset: assets/fonts/AvenirLTStd-HeavyOblique.otf
          weight: 700
          style: italic
        - asset: assets/fonts/AvenirLTStd-Black.otf
          weight: 900
        - asset: assets/fonts/AvenirLTStd-BlackOblique.otf
          weight: 900
          style: italic
        - asset: assets/fonts/AvenirLTStd-Light.otf
          weight: 300
        - asset: assets/fonts/AvenirLTStd-LightOblique.otf
          weight: 300
          style: italic

    - family: HelveticaNeue
      fonts:
        - asset: assets/fonts/HelveticaNeueRoman.otf
          weight: 400
        - asset: assets/fonts/HelveticaNeueHeavy.otf
          weight: 700
        - asset: assets/fonts/HelveticaNeueHeavyItalic.otf
          weight: 700
          style: italic
        - asset: assets/fonts/HelveticaNeueBlack.otf
          weight: 900
        - asset: assets/fonts/HelveticaNeueBlackItalic.otf
          weight: 900
          style: italic
